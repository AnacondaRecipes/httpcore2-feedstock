{% set version = "2.5.0" %}
{% set name = "httpcore2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 88aa170137c17328d5ac44234f9fd10706466d5fb347f3edac4d39b91137b09d

build:
  skip: true # [py<310]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - hatch-fancy-pypi-readme
    - hatchling
    - pip
    - python
    - uv-dynamic-versioning >=0.8.0
  run:
    - h11 >=0.16
    - python
    - truststore >=0.10
  run_constrained:
    - anyio >=4.5.0,<5.0
    - h2 >=3,<5
    - socksio 1.*
    - trio >=0.22.0,<1.0

test:
  imports:
    - httpcore2
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/pydantic/httpx2
  summary: The next generation HTTP client.
  description: |
    HTTPX2 is a fully featured HTTP client library for Python. It includes an
    integrated command line client, has support for both HTTP/1.1 and HTTP/2,
    and provides both sync and async APIs.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.md
  dev_url: https://github.com/pydantic/httpx2
  doc_url: https://httpx2.pydantic.dev

extra:
  recipe-maintainers:
    - bollwyvl
    - Kludex