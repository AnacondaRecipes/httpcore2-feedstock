# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.3.0"
  python_check_max: "3.14"

package:
  name: httpcore2
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/h/httpcore2/httpcore2-${{ version }}.tar.gz
  sha256: 07327e251560960eea8e969d92d4c6a325feb13cca39e25340731336c3baf924

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - hatch-fancy-pypi-readme
    - hatchling
    - pip
    - python ${{ python_min }}.*
    - uv-dynamic-versioning >=0.8.0
  run:
    - h11 >=0.16
    - python >=${{ python_min }}
    - truststore >=0.10
  run_constraints:
    - anyio >=4.5.0,<5.0
    - h2 >=3,<5
    - socksio 1.*
    - trio >=0.22.0,<1.0
  # depends on https://github.com/conda/ceps/pull/146
  # extras:
  #   asyncio:
  #     - anyio >=4.5.0,<5.0
  #   http2:
  #     - h2 >=3,<5
  #   socks:
  #     - socksio 1.*
  #   trio:
  #     - trio >=0.22.0,<1.0

tests:
  - python:
      imports: httpcore2
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*

about:
  homepage: https://pypi.org/project/httpcore2
  summary: A minimal low-level HTTP client.
  license: BSD-3-Clause
  license_file: LICENSE.md
  repository: https://github.com/pydantic/httpx2

extra:
  recipe-maintainers:
    - bollwyvl
    - Kludex
